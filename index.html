<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library Archive</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/themes.css">
    <style>
        /* All index‑specific styles (unchanged, except :root and [data-theme] removed) */
        body {
            margin: 20px auto;
            max-width: 1100px;
            padding: 20px;
            line-height: 1.6;
        }
        .header {
            border-bottom: 3px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        h1 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .theme-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .theme-btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.2s;
        }
        .theme-btn:hover, .theme-btn.active {
            background: var(--hover-bg);
            color: var(--hover-text);
        }
        .download-section {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .download-btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.2s;
        }
        .download-btn:hover {
            background: var(--hover-bg);
            color: var(--hover-text);
        }
        .download-btn.selected {
            background: var(--hover-bg);
            color: var(--hover-text);
        }
        .download-info {
            font-size: 0.85em;
            font-style: italic;
        }
        #download-actions {
            margin-top: 10px;
            padding: 10px;
            border: 2px dashed var(--border);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }
        #download-actions button {
            padding: 6px 12px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.2s;
        }
        #download-actions button:hover {
            background: var(--hover-bg);
            color: var(--hover-text);
        }
        #format-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: 10px;
        }
        #format-selector label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .stats {
            font-weight: bold;
            margin-top: 5px;
            font-size: 0.9em;
        }
        .search-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .search-panel input {
            padding: 10px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            outline: none;
            flex: 1 1 200px;
            box-sizing: border-box;
        }
        .year-range {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1 1 300px;
        }
        .year-range input {
            min-width: 80px;
            flex: 1;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th {
            text-align: left;
            border-bottom: 2px solid var(--border);
            padding: 10px;
            font-size: 0.8em;
            background: var(--bg);
            position: sticky;
            top: 0;
            user-select: none;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid var(--accent);
            font-size: 0.9em;
        }
        .col-title {
            width: 35%;
            cursor: pointer;
        }
        .col-author {
            width: 30%;
        }
        .col-year {
            width: 15%;
            cursor: pointer;
        }
        .col-actions {
            width: 20%;
            text-align: left;
        }
        .col-title:hover, .col-year:hover {
            background: var(--accent);
        }
        .letter-divider {
            background: var(--hover-bg);
            color: var(--hover-text);
            padding: 5px 10px;
            font-weight: bold;
        }
        .title-text {
            color: var(--text);
            text-decoration: none;
            font-weight: normal;
        }
        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .action-btn {
            display: inline-block;
            font-size: 0.75em;
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-weight: bold;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
            background: var(--bg);
            white-space: nowrap;
            cursor: pointer;
        }
        .action-btn:hover {
            background: var(--hover-bg);
            color: var(--hover-text);
        }
        .action-btn.read {
            border-width: 2px;
        }
        .action-btn.selected {
            background: var(--hover-bg);
            color: var(--hover-text);
        }
        @media (max-width: 600px) {
            .search-panel {
                flex-direction: column;
            }
            .year-range {
                width: 100%;
            }
            body {
                padding: 10px;
            }
            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }
            .download-section {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <h1>Digital Library Archive</h1>
            <div class="theme-buttons">
                <button class="theme-btn" data-theme="light" onclick="setTheme('light')">Light</button>
                <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')">Dark</button>
                <button class="theme-btn" data-theme="sepia" onclick="setTheme('sepia')">Sepia</button>
                <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">Forest</button>
                <button class="theme-btn" data-theme="ocean" onclick="setTheme('ocean')">Ocean</button>
                <button class="theme-btn" data-theme="highcontrast" onclick="setTheme('highcontrast')">High Contrast</button>
                <button class="theme-btn" data-theme="vintage" onclick="setTheme('vintage')">Vintage</button>
                <button class="theme-btn" data-theme="monochrome" onclick="setTheme('monochrome')">Monochrome</button>
            </div>
        </div>

        <div class="download-section">
            <button class="download-btn" id="downloadBtn" onclick="toggleDownloadMode()">
                Download Mode
            </button>
            <span class="download-info" id="downloadInfo">Click to select books for download</span>
        </div>

        <div id="download-actions" style="display: none;">
            <span>Selected: <span id="selected-count">0</span></span>
            <button id="download-selected-btn">Download Selected</button>
            <button id="clear-selection-btn">Clear</button>
            <div id="format-selector" style="display: none;">
                <label><input type="radio" name="format" value="epub" checked> EPUB</label>
                <label><input type="radio" name="format" value="rtf"> RTF</label>
                <button id="start-download-btn">Download</button>
                <button id="cancel-download-btn">Cancel</button>
            </div>
        </div>

        <div class="stats">Total Items: [<span id="book-count">0</span>]</div>
        
        <div class="search-panel">
            <input type="search" id="searchTitle" oninput="debounceSearch()" placeholder="Filter by Title...">
            <input type="search" id="searchAuthor" oninput="debounceSearch()" placeholder="Filter by Author...">
            <div class="year-range">
                <input type="text" id="yearFrom" oninput="debounceSearch()" placeholder="Year From">
                <span>—</span>
                <input type="text" id="yearTo" oninput="debounceSearch()" placeholder="Year To">
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="col-title" id="th-title" onclick="sortBy('title')">TITLE</th>
                    <th class="col-author">AUTHOR/AUTHOR'S</th>
                    <th class="col-year" id="th-year" onclick="sortBy('year')">YEAR</th>
                    <th class="col-actions">ACTIONS</th>
                </tr>
            </thead>
            <tbody id="library-body">
                <tr><td colspan="4" style="text-align:center;padding:30px;font-style:italic;">Loading archive...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="js/themes.js" defer></script>
    <script src="js/index.js" defer></script>
</body>
</html>
