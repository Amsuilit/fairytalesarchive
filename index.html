<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library Archive</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent: #f4f4f4;
            --border: #000000;
            --hover-bg: #000000;
            --hover-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #e0e0e0;
            --accent: #2a2a2a;
            --border: #444444;
            --hover-bg: #e0e0e0;
            --hover-text: #1a1a1a;
        }

        [data-theme="sepia"] {
            --bg: #f4ecd8;
            --text: #5c4a3a;
            --accent: #e8dcc0;
            --border: #8b7355;
            --hover-bg: #5c4a3a;
            --hover-text: #f4ecd8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", Courier, monospace;
            margin: 20px auto;
            max-width: 1100px;
            padding: 20px;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }
        
        .header {
            border-bottom: 3px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .theme-buttons {
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.2s;
        }

        .theme-btn:hover, .theme-btn.active {
            background: var(--hover-bg);
            color: var(--hover-text);
        }

        .download-section {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 10px;
        }

        .download-btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--hover-bg);
            color: var(--hover-text);
        }

        .download-btn.selected {
            background: var(--hover-bg);
            color: var(--hover-text);
        }

        .download-info {
            font-size: 0.85em;
            font-style: italic;
        }

        .stats {
            font-weight: bold;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .search-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .search-panel input {
            padding: 10px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            outline: none;
            flex: 1 1 200px;
            box-sizing: border-box;
        }

        .year-range {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1 1 300px;
        }

        .year-range input {
            min-width: 80px;
            flex: 1;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            text-align: left;
            border-bottom: 2px solid var(--border);
            padding: 10px;
            font-size: 0.8em;
            background: var(--bg);
            position: sticky;
            top: 0;
            user-select: none;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--accent);
            font-size: 0.9em;
        }
        
        .col-title {
            width: 35%;
            cursor: pointer;
        }

        .col-author {
            width: 30%;
        }

        .col-year {
            width: 15%;
            cursor: pointer;
        }

        .col-actions {
            width: 20%;
            text-align: left;
        }

        .col-title:hover, .col-year:hover {
            background: var(--accent);
        }

        .letter-divider {
            background: var(--hover-bg);
            color: var(--hover-text);
            padding: 5px 10px;
            font-weight: bold;
        }

        .title-text {
            color: var(--text);
            text-decoration: none;
            font-weight: normal;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-block;
            font-size: 0.75em;
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-weight: bold;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
            background: var(--bg);
            white-space: nowrap;
        }

        .action-btn:hover {
            background: var(--hover-bg);
            color: var(--hover-text);
        }

        .action-btn.read {
            border-width: 2px;
        }

        .action-btn.selected {
            background: var(--hover-bg);
            color: var(--hover-text);
        }

        @media (max-width: 600px) {
            .search-panel {
                flex-direction: column;
            }
            .year-range {
                width: 100%;
            }
            body {
                padding: 10px;
            }
            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }
            .download-section {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <h1>Digital Library Archive</h1>
            <div class="theme-buttons">
                <button class="theme-btn active" onclick="setTheme('light')">Light</button>
                <button class="theme-btn" onclick="setTheme('dark')">Dark</button>
                <button class="theme-btn" onclick="setTheme('sepia')">Sepia</button>
            </div>
        </div>

        <div class="download-section">
            <button class="download-btn" id="downloadBtn" onclick="toggleDownloadMode()">
                📥 Download Mode
            </button>
            <span class="download-info" id="downloadInfo">Click to select books for download</span>
        </div>

        <div class="stats">Total Items: [<span id="book-count">0</span>]</div>
        
        <div class="search-panel">
            <input type="search" id="searchTitle" oninput="debounceSearch()" placeholder="Filter by Title...">
            <input type="search" id="searchAuthor" oninput="debounceSearch()" placeholder="Filter by Author...">
            <div class="year-range">
                <input type="text" id="yearFrom" oninput="debounceSearch()" placeholder="Year From">
                <span>—</span>
                <input type="text" id="yearTo" oninput="debounceSearch()" placeholder="Year To">
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="col-title" id="th-title" onclick="sortBy('title')">TITLE</th>
                    <th class="col-author">AUTHOR/AUTHOR'S</th>
                    <th class="col-year" id="th-year" onclick="sortBy('year')">YEAR</th>
                    <th class="col-actions">ACTIONS</th>
                </tr>
            </thead>
            <tbody id="library-body"></tbody>
        </table>
    </div>

    <script>
        let archiveData = [];
        let currentSort = '';
        let sortAscending = true;
        let searchTimeout = null;
        let downloadMode = false;
        let selectedBooks = new Set();
        const DOM = {};

        // Theme management
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                const btnTheme = btn.textContent.toLowerCase();
                if (btnTheme === savedTheme) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Download mode toggle
        function toggleDownloadMode() {
            downloadMode = !downloadMode;
            const btn = document.getElementById('downloadBtn');
            const info = document.getElementById('downloadInfo');
            
            if (downloadMode) {
                btn.classList.add('selected');
                info.textContent = `${selectedBooks.size} book(s) selected - Click RTF buttons to select`;
            } else {
                btn.classList.remove('selected');
                info.textContent = 'Click to select books for download';
                selectedBooks.clear();
                render();
            }
        }

        function toggleBookSelection(base, event) {
            if (!downloadMode) return;
            
            event.preventDefault();
            
            if (selectedBooks.has(base)) {
                selectedBooks.delete(base);
            } else {
                selectedBooks.add(base);
            }
            
            const info = document.getElementById('downloadInfo');
            info.textContent = `${selectedBooks.size} book(s) selected - Click RTF buttons to select`;
            
            // Update button appearance
            event.target.classList.toggle('selected');
        }

        window.addEventListener('DOMContentLoaded', () => {
            DOM.searchTitle = document.getElementById('searchTitle');
            DOM.searchAuthor = document.getElementById('searchAuthor');
            DOM.yearFrom = document.getElementById('yearFrom');
            DOM.yearTo = document.getElementById('yearTo');
            DOM.tbody = document.getElementById('library-body');
            DOM.countStr = document.getElementById('book-count');
            DOM.titleHeader = document.getElementById('th-title');
            DOM.yearHeader = document.getElementById('th-year');
            
            loadTheme();
        });

        function parseYear(yearStr) {
            if (!yearStr || yearStr === 'N/A') return 999999;
            const isBC = yearStr.toUpperCase().includes('BC');
            const num = parseInt(yearStr.replace(/[^0-9]/g, ''));
            if (isNaN(num)) return 999999;
            return isBC ? -num : num;
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(render, 300);
        }

        function updateHeaders() {
            DOM.titleHeader.innerText = 'TITLE';
            DOM.yearHeader.innerText = 'YEAR';
            const arrow = sortAscending ? ' ▲' : ' ▼';
            if (currentSort === 'title') DOM.titleHeader.innerText = 'TITLE' + arrow;
            if (currentSort === 'year') DOM.yearHeader.innerText = 'YEAR' + arrow;
        }

        function sortBy(field) {
            if (currentSort === field) sortAscending = !sortAscending;
            else { currentSort = field; sortAscending = true; }
            archiveData.sort((a, b) => {
                if (field === 'year') {
                    if (a._yNum === 999999) return 1;
                    if (b._yNum === 999999) return -1;
                    return sortAscending ? a._yNum - b._yNum : b._yNum - a._yNum;
                }
                if (a._tUpper < b._tUpper) return sortAscending ? -1 : 1;
                if (a._tUpper > b._tUpper) return sortAscending ? 1 : -1;
                return 0;
            });
            updateHeaders();
            render();
        }

        function render() {
            const titleTerm = DOM.searchTitle.value.toUpperCase();
            const authorTerm = DOM.searchAuthor.value.toUpperCase();
            const yearFromStr = DOM.yearFrom.value.trim();
            const yearToStr = DOM.yearTo.value.trim();
            const minYear = yearFromStr ? parseYear(yearFromStr) : -999999;
            const maxYear = yearToStr ? parseYear(yearToStr) : 999999;

            const isFiltering = titleTerm || authorTerm || yearFromStr || yearToStr;
            const showDividers = currentSort === 'title' && sortAscending && !isFiltering;

            let htmlRows = [], count = 0, currentLetter = '';

            archiveData.forEach(book => {
                if (!book._tUpper.includes(titleTerm)) return;
                if (!book._aUpper.includes(authorTerm)) return;
                const inYear = (!yearFromStr && !yearToStr) || (book._yNum >= minYear && book._yNum <= maxYear);
                if (!inYear) return;

                if (showDividers) {
                    const ch = book._tUpper[0];
                    if (ch !== currentLetter) {
                        currentLetter = ch;
                        htmlRows.push(`<tr><td colspan="4" class="letter-divider">${ch}</td></tr>`);
                    }
                }

                // EPUB reader link
                const epubLink = book.epub
                    ? `reader.html?file=${encodeURIComponent('books/' + book.base + '.epub')}`
                    : null;

                // Action buttons
                let actionsHtml = '<div class="action-buttons">';
                
                // Read button
                if (epubLink) {
                    actionsHtml += `<a href="${epubLink}" class="action-btn read">📖 Read</a>`;
                }
                
                // RTF download button
                if (book.rtf) {
                    const isSelected = selectedBooks.has(book.base);
                    const selectedClass = isSelected ? ' selected' : '';
                    if (downloadMode) {
                        actionsHtml += `<a href="#" onclick="toggleBookSelection('${book.base}', event)" class="action-btn${selectedClass}">💾 RTF</a>`;
                    } else {
                        actionsHtml += `<a href="books/${encodeURIComponent(book.base + '.rtf')}" download class="action-btn">💾 RTF</a>`;
                    }
                }
                
                actionsHtml += '</div>';

                htmlRows.push(`<tr>
                    <td><span class="title-text">${book.t}</span></td>
                    <td>${book.a}</td>
                    <td>${book.y}</td>
                    <td>${actionsHtml}</td>
                </tr>`);
                count++;
            });

            if (count === 0) {
                htmlRows.push(`<tr><td colspan="4" style="text-align:center;padding:30px;font-style:italic;">No matches found in the archive.</td></tr>`);
            }
            DOM.tbody.innerHTML = htmlRows.join('');
            DOM.countStr.innerText = count;
        }

        function loadData() {
            const script = document.createElement('script');
            script.src = 'data.js?v=' + Date.now();
            script.onload = () => {
                archiveData.forEach(book => {
                    book._tUpper = (book.t || '').toUpperCase();
                    book._aUpper = (book.a || '').toUpperCase();
                    book._yNum = parseYear(book.y);
                });
                sortBy('title');
            };
            document.head.appendChild(script);
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

        window.onload = loadData;
    </script>
</body>
</html>
