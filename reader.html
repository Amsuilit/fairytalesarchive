<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB Reader</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #000000;
            --hover-bg: #000000;
            --hover-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #e0e0e0;
            --border: #444444;
            --hover-bg: #e0e0e0;
            --hover-text: #1a1a1a;
        }

        [data-theme="sepia"] {
            --bg: #f4ecd8;
            --text: #5c4a3a;
            --border: #8b7355;
            --hover-bg: #5c4a3a;
            --hover-text: #f4ecd8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        #controls {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            z-index: 1000;
        }

        button, a.btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", Courier, monospace;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        button:hover, a.btn:hover, button.active {
            background: var(--hover-bg);
            color: var(--hover-text);
        }

        #viewer {
            margin-top: 80px;
            padding: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        #viewer iframe {
            width: 100%;
            border: none;
            min-height: 80vh;
        }

        .theme-buttons {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div id="controls">
        <a href="index.html" class="btn">← Library</a>
        <button id="prev">Previous</button>
        <button id="next">Next</button>
        <div class="theme-buttons">
            <button class="theme-btn active" onclick="setTheme('light')">Light</button>
            <button class="theme-btn" onclick="setTheme('dark')">Dark</button>
            <button class="theme-btn" onclick="setTheme('sepia')">Sepia</button>
        </div>
    </div>
    
    <div id="viewer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let rendition;
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                const btnTheme = btn.textContent.toLowerCase();
                if (btnTheme === savedTheme) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Load EPUB.js library
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js';
        script.onload = initReader;
        document.head.appendChild(script);

        function initReader() {
            const params = new URLSearchParams(window.location.search);
            const epubFile = params.get('file');
            
            if (!epubFile) {
                document.getElementById('viewer').innerHTML = '<p style="text-align:center;margin-top:50px;">No EPUB file specified</p>';
                return;
            }

            const book = ePub(epubFile);
            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "80vh",
                spread: "none"
            });

            rendition.display();

            document.getElementById('prev').addEventListener('click', () => {
                rendition.prev();
            });

            document.getElementById('next').addEventListener('click', () => {
                rendition.next();
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') rendition.prev();
                if (e.key === 'ArrowRight') rendition.next();
            });
        }

        window.addEventListener('DOMContentLoaded', loadTheme);
    </script>
</body>
</html>
